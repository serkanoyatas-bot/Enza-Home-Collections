<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tam Otomatik PDF Flipbook</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.12.313/pdf.min.js"></script>

    <style>
        body {
            margin: 0; padding: 0;
            background-color: #222;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; font-family: Arial, sans-serif;
        }
        #loading {
            color: white; font-size: 20px; margin-bottom: 20px;
        }
        #flipbook {
            display: none; /* Yüklenene kadar gizle */
            width: 1000px;
            height: 600px;
        }
        canvas {
            width: 100%;
            height: 100%;
            background-color: white;
        }
    </style>
</head>
<body>

    <div id="loading">PDF Kitaba Dönüştürülüyor, Lütfen Bekleyin...</div>
    <div id="flipbook"></div>

    <script>
        // ÜZERİNDE DEĞİŞİKLİK YAPACAĞIN TEK YER BURASI: PDF dosyanın adını yaz
        const pdfUrl = 'Enza Home Collections.pdf'; 

        // PDF.js worker ayarı
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.12.313/pdf.worker.min.js';

        // PDF'i yükle ve işleme başla
        pdfjsLib.getDocument(pdfUrl).promise.then(async function(pdf) {
            const flipbook = document.getElementById('flipbook');
            
            // Tüm sayfaları sırayla canvas olarak render et
            for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                const page = await pdf.getPage(pageNum);
                
                // Sayfa boyutlandırma ayarları
                const viewport = page.getViewport({ scale: 1.5 });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                // PDF sayfasını canvas'a çiz
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                
                // Oluşan sayfayı flipbook içine ekle
                flipbook.appendChild(canvas);
            }

            // Yükleme yazısını kaldır ve flipbook'u göster
            document.getElementById('loading').style.display = 'none';
            $('#flipbook').show();

            // Turn.js'i (Flipbook efektini) tetikle
            $('#flipbook').turn({
                width: 1000,
                height: 600,
                autoCenter: true,
                duration: 1000 // Sayfa çevrilme hızı (ms)
            });

        }).catch(function(error) {
            document.getElementById('loading').innerText = "PDF yüklenirken hata oluştu: " + error.message;
        });
    </script>
</body>
</html>
