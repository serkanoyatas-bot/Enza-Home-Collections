<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kararlı PDF Flipbook</title>
    
    <!-- Sadece PDF okuyucu kütüphane gerekli -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        body {
            margin: 0; padding: 0;
            background-color: #1a1a1a;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; font-family: sans-serif;
            overflow: hidden;
            perspective: 1500px; /* 3D derinlik efekti için şart */
        }
        #loading { color: #fff; font-size: 18px; margin-bottom: 20px; }
        
        /* Kitap Alanı */
        .book {
            position: relative;
            width: 450px; /* Tek sayfa genişliği */
            height: 600px;
            display: none;
            transform-style: preserve-3d;
            transition: transform 0.5s;
        }
        
        /* Her Bir Sayfanın Yapısı */
        .page {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            transform-origin: left center; /* Sayfa soldan açılacak */
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
            backface-visibility: hidden; /* Sayfanın arkası dönünce gizlensin */
        }
        
        canvas {
            width: 100%; height: 100%;
            background: white;
            box-shadow: 5px 0 15px rgba(0,0,0,0.3);
            display: block;
        }

        /* Çevrilen sayfaların alacağı 3D pozisyon */
        .page.flipped {
            transform: rotateY(-180deg);
        }
        
        /* Kontrol Butonları */
        .buttons { margin-top: 20px; z-index: 10; }
        button {
            padding: 10px 20px; font-size: 16px; cursor: pointer;
            background: #fff; border: none; border-radius: 5px; margin: 0 5px;
        }
    </style>
</head>
<body>

    <div id="loading">Please wait.. It's loading..</div>
    
    <div id="book" class="book"></div>

    <div class="buttons">
        <button id="prevBtn">Previous</button>
        <button id="nextBtn">Next</button>
    </div>

    <script>
        // PDF DOSYANIN ADINI KONTROL ET
        const pdfUrl = 'Enza Home Collections.pdf'; 

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let currentId = 0;
        let pages = [];

        async function createFlipbook() {
            try {
                const pdf = await pdfjsLib.getDocument(pdfUrl).promise;
                const book = document.getElementById('book');

                // PDF Sayfalarını sırayla DOM'a ekliyoruz
                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    
                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page';
                    // Z-index ayarı: İlk sayfalar üstte durmalı
                    pageDiv.style.zIndex = pdf.numPages - pageNum; 
                    
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    
                    const viewport = page.getViewport({ scale: 1.5 });
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    pageDiv.appendChild(canvas);
                    book.appendChild(pageDiv);

                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    pages.push(pageDiv);
                }

                // Yükleme bitti, kitabı göster
                document.getElementById('loading').style.display = 'none';
                book.style.display = 'block';

                // Sayfa Tıklama İle Çevirme Etkinliği
                pages.forEach((page, index) => {
                    page.addEventListener('click', () => {
                        if (index === currentId) {
                            // İleri çevir
                            page.classList.add('flipped');
                            page.style.zIndex = index;
                            currentId++;
                        } else if (index === currentId - 1) {
                            // Geri çevir
                            page.classList.remove('flipped');
                            page.style.zIndex = pages.length - index;
                            currentId--;
                        }
                    });
                });

                // Buton Kontrolleri
                document.getElementById('nextBtn').addEventListener('click', () => {
                    if (currentId < pages.length) {
                        pages[currentId].classList.add('flipped');
                        pages[currentId].style.zIndex = currentId;
                        currentId++;
                    }
                });

                document.getElementById('prevBtn').addEventListener('click', () => {
                    if (currentId > 0) {
                        currentId--;
                        pages[currentId].classList.remove('flipped');
                        pages[currentId].style.zIndex = pages.length - currentId;
                    }
                });

            } catch (error) {
                document.getElementById('loading').innerText = "Hata: " + error.message;
            }
        }

        window.onload = createFlipbook;
    </script>
</body>
</html>
