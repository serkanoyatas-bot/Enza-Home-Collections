<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garantili PDF Flipbook</title>
    
    <script src="https://unpkg.com/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        body {
            margin: 0; padding: 0;
            background-color: #1a1a1a;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; font-family: sans-serif;
            overflow: hidden;
        }
        #loading {
            color: #fff; font-size: 18px; margin-bottom: 20px;
        }
        /* Alt alta gelmeyi engelleyen kritik kapsayıcı alan */
        .container {
            width: 1000px;
            height: 600px;
            display: none; /* Yüklenene kadar gizle */
        }
        .page {
            width: 500px;
            height: 600px;
            background-color: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        canvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="loading">PDF Sayfaları Hazırlanıyor...</div>
    <div id="flipbook" class="container"></div>

    <script>
        // PDF DOSYANIN ADINI KONTROL ET
        const pdfUrl = 'Enza Home Collections.pdf'; 

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        async function startBook() {
            try {
                const pdf = await pdfjsLib.getDocument(pdfUrl).promise;
                const flipbook = document.getElementById('flipbook');

                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    
                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page';
                    
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    
                    // Net bir görüntü için 1.5x scale
                    const viewport = page.getViewport({ scale: 1.5 });
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    pageDiv.appendChild(canvas);
                    flipbook.appendChild(pageDiv);

                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                }

                // Sayfalar oluştuktan sonra yükleme yazısını kaldır ve göster
                document.getElementById('loading').style.display = 'none';
                flipbook.style.display = 'block';

                // Yeni nesil Page-Flip motorunu tetikle (jQuery bağımlılığı yoktur)
                const pageFlip = new St.PageFlip(flipbook, {
                    width: 500,
                    height: 600,
                    size: "fixed",
                    minWidth: 300, maxWidth: 1000,
                    minHeight: 400, maxHeight: 1200,
                    drawShadow: true,
                    showCover: true
                });

                pageFlip.loadFromHTML(document.querySelectorAll('.page'));

            } catch (error) {
                document.getElementById('loading').innerText = "Hata: " + error.message;
                console.error(error);
            }
        }

        window.onload = startBook;
    </script>
</body>
</html>
